# nginx as turbopuffer's namespace-routing load balancer.
#
# The whole idea: all tpuf-node servers are identical and share one object store,
# so any node CAN serve any namespace. Routing a namespace to the *same* node every
# time just keeps that node's DRAM cache warm. Consistent hashing (ketama) gives
# that stickiness while remapping only ~1/N of namespaces when a node is added or
# removed — far better than plain modulo hashing, which reshuffles almost everything.

worker_processes  1;
events { worker_connections  1024; }

http {
    # The pool of identical query nodes.
    #
    # `hash $ns consistent` hashes the per-request $ns variable (the namespace,
    # captured from the URL below) onto a ketama ring. Same namespace -> same node;
    # adding/removing a server moves only that server's share of the ring.
    upstream tpuf_nodes {
        hash $ns consistent;
        server node0:8080;
        server node1:8080;
        server node2:8080;
    }

    server {
        listen 8080;

        # Capture the namespace from /v1/namespaces/<ns>/... into $ns so the
        # upstream hash routes on the namespace alone (not the whole path, so
        # /query and /info for one namespace land on the same node).
        location ~ ^/v1/namespaces/(?<ns>[^/]+)/ {
            proxy_pass http://tpuf_nodes;
            proxy_set_header Host $host;
            # Surface the chosen upstream so you can see the routing from outside.
            add_header X-Tpuf-Upstream $upstream_addr always;
        }

        location = / {
            return 200 "tpuf load balancer — POST /v1/namespaces/<ns>/query\n";
        }
    }
}
